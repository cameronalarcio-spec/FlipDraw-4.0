<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlipDraw — Flipbook Animation Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0e0e12;
    --surface: #16161e;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #ff5c5c;
    --accent2: #5cbaff;
    --accent3: #ffe05c;
    --text: #f0f0f8;
    --text-muted: #7878a0;
    --canvas-bg: #ffffff;
    --panel-w: 280px;
    --toolbar-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOPBAR ── */
  #topbar {
    height: var(--toolbar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }

  #logo {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-right: 8px;
  }
  #logo span { color: var(--accent); }

  .top-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .top-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .top-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .top-btn.primary:hover { background: #ff3a3a; }
  .top-btn.success {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #000;
  }

  #spacer { flex: 1; }

  /* ── FPS + FRAME COUNT ── */
  .top-info {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .top-info input[type=number] {
    width: 42px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 3px 6px;
    text-align: center;
  }
  .top-info input::-webkit-inner-spin-button { display: none; }

  /* ── MAIN LAYOUT ── */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── LEFT PANEL: TOOLS ── */
  #tools-panel {
    width: 60px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    gap: 4px;
    flex-shrink: 0;
  }

  .tool-btn {
    width: 42px;
    height: 42px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all .12s;
    position: relative;
  }
  .tool-btn:hover { background: var(--surface2); color: var(--text); }
  .tool-btn.active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }
  .tool-sep {
    width: 28px;
    height: 1px;
    background: var(--border);
    margin: 6px 0;
  }

  /* color swatch */
  #color-display {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: border-color .12s;
    position: relative;
    overflow: hidden;
  }
  #color-display:hover { border-color: var(--text-muted); }
  #color-display input[type=color] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  /* size slider */
  #size-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
  }
  #size-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
  }
  #brush-size {
    -webkit-appearance: none;
    appearance: none;
    writing-mode: vertical-lr;
    direction: rtl;
    width: 6px;
    height: 60px;
    background: var(--surface2);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  #brush-size::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* ── CANVAS AREA ── */
  #canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    background: #0a0a10;
  }

  #canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ghost / onion layer */
  #ghost-canvas {
    position: absolute;
    pointer-events: none;
    opacity: 0.3;
    image-rendering: pixelated;
    z-index: 2;
  }

  #main-canvas {
    cursor: crosshair;
    image-rendering: pixelated;
    box-shadow: 0 0 0 1px #fff2, 0 20px 60px #0008;
    position: relative;
    z-index: 1;
    touch-action: none;
  }

  /* ── FRAME STRIP ── */
  #frame-strip-wrap {
    height: 120px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
  }

  #frame-strip {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .frame-thumb {
    flex-shrink: 0;
    width: 80px;
    height: 80px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: #fff;
    cursor: pointer;
    position: relative;
    transition: border-color .12s;
    overflow: hidden;
  }
  .frame-thumb:hover { border-color: var(--text-muted); }
  .frame-thumb.active { border-color: var(--accent); }
  .frame-thumb canvas { width: 100%; height: 100%; display: block; }
  .frame-num {
    position: absolute;
    bottom: 2px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: #fff;
    background: rgba(0,0,0,.5);
    pointer-events: none;
    line-height: 14px;
  }
  .frame-del {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    line-height: 16px;
    text-align: center;
    cursor: pointer;
    display: none;
  }
  .frame-thumb:hover .frame-del { display: block; }

  #add-frame-btn {
    flex-shrink: 0;
    width: 80px;
    height: 80px;
    border-radius: 6px;
    border: 2px dashed var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 28px;
    cursor: pointer;
    transition: all .12s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #add-frame-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── RIGHT PANEL: PLAY + PALETTE ── */
  #right-panel {
    width: var(--panel-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 16px;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .panel-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  /* playback */
  #play-preview {
    width: 100%;
    aspect-ratio: 1;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border);
  }
  #preview-canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

  #play-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .play-btn {
    flex: 1;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    transition: all .12s;
  }
  .play-btn:hover { border-color: var(--text-muted); }
  .play-btn.active { border-color: var(--accent); color: var(--accent); }

  /* palette */
  #palette-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
  }
  .swatch {
    aspect-ratio: 1;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .1s, transform .1s;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.selected { border-color: #fff; }

  /* opacity */
  #opacity-wrap { display: flex; align-items: center; gap: 10px; }
  #opacity-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #opacity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  #opacity-val {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    width: 34px;
    text-align: right;
  }

  /* onion toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .toggle-label { font-size: 12px; color: var(--text-muted); }
  .toggle {
    width: 34px;
    height: 18px;
    border-radius: 9px;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background .2s;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff;
    top: 2px;
    left: 2px;
    transition: left .2s;
  }
  .toggle.on::after { left: 18px; }

  /* export GIF note */
  #export-note {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    line-height: 1.5;
    text-align: center;
  }

  /* ── MODAL ── */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    display: none;
  }
  #modal-overlay.visible { display: flex; }
  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    max-width: 340px;
    width: 90%;
    text-align: center;
  }
  #modal h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  #modal p { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; }
  #modal canvas { border: 1px solid var(--border); border-radius: 6px; image-rendering: pixelated; }
  .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
  .modal-btns button { flex: 1; }

  /* ── FULL PREVIEW MODAL ── */
  #preview-overlay {
    position: fixed; inset: 0; background: #000;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 200;
  }
  #preview-overlay.visible { display: flex; }
  #preview-overlay canvas {
    image-rendering: pixelated;
    max-width: 90vw; max-height: 80vh;
    box-shadow: 0 0 60px #0008;
  }
  #preview-topbar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 52px; background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; gap: 14px;
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #ffffff18;
  }
  #preview-topbar span {
    font-family: 'Space Mono', monospace; font-size: 12px; color: #888;
  }
  #preview-fps-wrap {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Space Mono', monospace; font-size: 11px; color: #888;
  }
  #preview-fps {
    width: 44px; padding: 4px 6px; text-align: center;
    background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
    color: #fff; font-family: 'Space Mono', monospace; font-size: 11px;
  }
  #preview-frame-indicator {
    font-family: 'Space Mono', monospace; font-size: 13px;
    color: #fff; min-width: 80px; text-align: center;
  }
  #preview-controls { display: flex; gap: 8px; }
  .prev-ctrl-btn {
    padding: 6px 16px; border-radius: 6px;
    border: 1px solid #333; background: #1a1a1a;
    color: #ccc; cursor: pointer; font-size: 14px;
    transition: all .12s;
  }
  .prev-ctrl-btn:hover { border-color: #888; color: #fff; }
  .prev-ctrl-btn.active { border-color: var(--accent); color: var(--accent); }
  #preview-close {
    padding: 6px 16px; border-radius: 6px;
    border: 1px solid #ff5c5c44; background: transparent;
    color: #ff5c5c; cursor: pointer; font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    transition: all .12s;
  }
  #preview-close:hover { background: #ff5c5c22; }

</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">Flip<span>Draw</span> 🎬</div>
  <div class="top-info">
    FPS
    <input type="number" id="fps-input" value="8" min="1" max="60">
  </div>
  <div class="top-info" id="frame-counter">Frame 1 / 1</div>
  <div id="spacer"></div>
  <button class="top-btn" onclick="clearFrame()">🗑 Clear</button>
  <button class="top-btn" onclick="duplicateFrame()">⧉ Dup</button>
  <button class="top-btn" onclick="showFullPreview()">⛶ Full Preview</button>
  <button class="top-btn" onclick="showExport()">⬇ Export</button>
  <button class="top-btn primary" onclick="addFrame()">+ Frame</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- TOOLS -->
  <div id="tools-panel">
    <button class="tool-btn active" id="tool-pen" onclick="setTool('pen')" title="Pen">✏️</button>
    <button class="tool-btn" id="tool-brush" onclick="setTool('brush')" title="Brush">🖌️</button>
    <button class="tool-btn" id="tool-line" onclick="setTool('line')" title="Line">╱</button>
    <button class="tool-btn" id="tool-rect" onclick="setTool('rect')" title="Rectangle">▭</button>
    <button class="tool-btn" id="tool-circle" onclick="setTool('circle')" title="Circle">○</button>
    <button class="tool-btn" id="tool-fill" onclick="setTool('fill')" title="Fill">🪣</button>
    <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')" title="Eraser">⬜</button>
    <div class="tool-sep"></div>
    <div id="size-wrap">
      <div id="size-label">SIZE</div>
      <input type="range" id="brush-size" min="1" max="40" value="4" orient="vertical">
    </div>
    <div class="tool-sep"></div>
    <div id="color-display" title="Color Picker">
      <input type="color" id="color-picker" value="#222222">
    </div>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="undo()" title="Undo">↩</button>
    <button class="tool-btn" onclick="redo()" title="Redo">↪</button>
  </div>

  <!-- CANVAS AREA -->
  <div id="canvas-area">
    <div id="canvas-wrap">
      <canvas id="ghost-canvas"></canvas>
      <canvas id="main-canvas"></canvas>
    </div>

    <!-- FRAME STRIP -->
    <div id="frame-strip-wrap">
      <div id="frame-strip">
        <!-- frames injected by JS -->
        <button id="add-frame-btn" onclick="addFrame()">+</button>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div>
      <div class="panel-section-title">Preview</div>
      <div id="play-preview"><canvas id="preview-canvas"></canvas></div>
    </div>

    <div id="play-controls">
      <button class="play-btn" id="btn-play" onclick="togglePlay()">▶</button>
      <button class="play-btn" onclick="prevFrame()">◀</button>
      <button class="play-btn" onclick="nextFrame()">▶</button>
    </div>

    <div>
      <div class="panel-section-title">Onion Skin</div>
      <div class="toggle-row">
        <span class="toggle-label">Show previous frame</span>
        <div class="toggle on" id="onion-toggle" onclick="toggleOnion()"></div>
      </div>
    </div>

    <div>
      <div class="panel-section-title">Opacity</div>
      <div id="opacity-wrap">
        <input type="range" id="opacity-slider" min="1" max="100" value="100">
        <span id="opacity-val">100%</span>
      </div>
    </div>

    <div>
      <div class="panel-section-title">Palette</div>
      <div id="palette-grid"></div>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Export Frames</h2>
    <p>Downloads all frames as a single <strong>flipdraw-frames.zip</strong> file containing individual PNGs. Then drag the PNGs into ezgif.com to make a GIF.</p>
    <canvas id="export-canvas" width="300" height="300"></canvas>
    <div id="export-progress" style="display:none;margin-top:12px;">
      <div style="background:var(--surface2);border-radius:4px;height:6px;overflow:hidden;">
        <div id="export-bar" style="height:100%;background:var(--accent2);width:0%;transition:width .2s;"></div>
      </div>
      <p id="export-note" style="margin-top:8px;font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);text-align:center;"></p>
    </div>
    <div class="modal-btns" style="margin-top:16px;">
      <button class="top-btn success" id="export-btn" onclick="downloadFrames()">⬇ Download ZIP</button>
      <button class="top-btn" onclick="hideExport()">Close</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const W = 500, H = 500;
const PALETTE = [
  '#000000','#ffffff','#ff5c5c','#ff8c5c','#ffd25c','#a8e05f',
  '#5cbaff','#a05cff','#ff5cb4','#5cffd2','#7c7c8a','#c0c0c0',
  '#8b0000','#004080','#006040','#604000','#300060','#003030',
  '#ff9999','#99ccff','#99ffcc','#ffcc99','#cc99ff','#ff99cc',
];

// ── STATE ──
let frames = [];      // array of off-screen canvases (clean drawing data, NO onion skin)
let currentFrame = 0;
let tool = 'pen';
let color = '#222222';
let brushSize = 4;
let opacity = 1.0;
let isDrawing = false;
let onionEnabled = true;
let playing = false;
let playInterval = null;
let history = [];
let redoStack = [];
let shapeStart = null;
let shapeSnap = null;

// ── CANVASES ──
// drawingCanvas: hidden canvas where user actually draws (no onion skin ever touches it)
// mainCanvas:    visible canvas = onion skin (tinted) + drawingCanvas composited on every render
const mainCanvas = document.getElementById('main-canvas');
const ctx = mainCanvas.getContext('2d');
const ghostCanvas = document.getElementById('ghost-canvas'); // kept in DOM but hidden
ghostCanvas.style.display = 'none';

const drawingCanvas = document.createElement('canvas'); // hidden, never added to DOM
drawingCanvas.width = W; drawingCanvas.height = H;
const dCtx = drawingCanvas.getContext('2d');

const previewCanvas = document.getElementById('preview-canvas');
const previewCtx = previewCanvas.getContext('2d');
const colorPicker = document.getElementById('color-picker');
const colorDisplay = document.getElementById('color-display');
const brushSlider = document.getElementById('brush-size');
const opacitySlider = document.getElementById('opacity-slider');
const opacityVal = document.getElementById('opacity-val');
const frameStrip = document.getElementById('frame-strip');
const fpsInput = document.getElementById('fps-input');
const onionToggle = document.getElementById('onion-toggle');

// ── COMPOSITE: draw onion skin + current drawing onto visible canvas ──
function composite() {
  ctx.clearRect(0, 0, W, H);

  // White background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // 1. Onion skin: previous frame drawn with multiply so white=transparent, dark strokes show through
  if (onionEnabled && currentFrame > 0) {
    // Draw previous frame strokes in red/pink tint at low opacity
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.globalAlpha = 0.25;
    // Tint the previous frame red by drawing a red rect then multiply the frame over it
    // Simpler: draw frame normally at low alpha first to get the shape
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 0.18;
    ctx.drawImage(frames[currentFrame - 1], 0, 0);
    ctx.restore();

    // Now tint those pixels red using multiply
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.globalAlpha = 1.0;
    ctx.fillStyle = '#ffaaaa';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // 2. Current drawing — multiply blend so its white background is invisible
  ctx.save();
  ctx.globalCompositeOperation = 'multiply';
  ctx.drawImage(drawingCanvas, 0, 0);
  ctx.restore();
}

// ── INIT ──
function init() {
  mainCanvas.width = W;
  mainCanvas.height = H;
  previewCanvas.width = W;
  previewCanvas.height = H;

  buildPalette();
  addFrame();
  setupEvents();
  updateColorUI();
  resizeCanvas();
}

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const ww = wrap.clientWidth - 40;
  const wh = wrap.clientHeight - 40;
  const scale = Math.min(ww / W, wh / H);
  const dw = Math.round(W * scale);
  const dh = Math.round(H * scale);
  mainCanvas.style.width = dw + 'px';
  mainCanvas.style.height = dh + 'px';
}

window.addEventListener('resize', resizeCanvas);

// ── FRAME MANAGEMENT ──
function makeFrame() {
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const cx = c.getContext('2d');
  cx.fillStyle = '#ffffff';
  cx.fillRect(0, 0, W, H);
  return c;
}

function addFrame() {
  const isFirst = frames.length === 0;
  if (!isFirst) saveCurrentToFrame(); // persist strokes before leaving

  const f = makeFrame();
  frames.splice(currentFrame + 1, 0, f);
  history.splice(currentFrame + 1, 0, []);
  redoStack.splice(currentFrame + 1, 0, []);
  currentFrame = isFirst ? 0 : currentFrame + 1;

  loadFrameToDrawingCanvas(); // load blank frame into drawingCanvas
  composite();
  renderFrameStrip();
  updateCounter();
  updatePreview();
}

function duplicateFrame() {
  saveCurrentToFrame();
  const f = makeFrame();
  f.getContext('2d').drawImage(frames[currentFrame], 0, 0);
  frames.splice(currentFrame + 1, 0, f);
  history.splice(currentFrame + 1, 0, []);
  redoStack.splice(currentFrame + 1, 0, []);
  currentFrame = currentFrame + 1;
  loadFrameToDrawingCanvas();
  composite();
  renderFrameStrip();
  updateCounter();
  updatePreview();
}

function deleteFrame(idx) {
  if (frames.length <= 1) { clearFrame(); return; }
  frames.splice(idx, 1);
  history.splice(idx, 1);
  redoStack.splice(idx, 1);
  if (currentFrame >= frames.length) currentFrame = frames.length - 1;
  renderFrameStrip();
  switchFrame(currentFrame);
}

function switchFrame(idx) {
  saveCurrentToFrame();
  currentFrame = idx;
  loadFrameToDrawingCanvas();
  composite();
  renderFrameStrip();
  updateCounter();
  updatePreview();
}

// Save drawingCanvas → frames[currentFrame]  (clean, no onion)
function saveCurrentToFrame() {
  if (!frames[currentFrame]) return;
  const fc = frames[currentFrame].getContext('2d');
  fc.clearRect(0, 0, W, H);
  fc.drawImage(drawingCanvas, 0, 0);
}

// Load frames[currentFrame] → drawingCanvas  (clean, no onion)
function loadFrameToDrawingCanvas() {
  dCtx.clearRect(0, 0, W, H);
  dCtx.fillStyle = '#ffffff';
  dCtx.fillRect(0, 0, W, H);
  if (frames[currentFrame]) dCtx.drawImage(frames[currentFrame], 0, 0);
}

function clearFrame() {
  pushHistory();
  dCtx.fillStyle = '#ffffff';
  dCtx.fillRect(0, 0, W, H);
  saveCurrentToFrame();
  composite();
  updateThumb(currentFrame);
}

function prevFrame() { if (currentFrame > 0) switchFrame(currentFrame - 1); }
function nextFrame() { if (currentFrame < frames.length - 1) switchFrame(currentFrame + 1); }

function updateCounter() {
  document.getElementById('frame-counter').textContent = `Frame ${currentFrame + 1} / ${frames.length}`;
}

// ── FRAME STRIP ──
function renderFrameStrip() {
  const addBtn = document.getElementById('add-frame-btn');
  [...frameStrip.querySelectorAll('.frame-thumb')].forEach(e => e.remove());

  frames.forEach((f, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'frame-thumb' + (i === currentFrame ? ' active' : '');
    wrap.onclick = () => switchFrame(i);

    const tc = document.createElement('canvas');
    tc.width = 80; tc.height = 80;
    tc.getContext('2d').drawImage(f, 0, 0, 80, 80);
    wrap.appendChild(tc);

    const num = document.createElement('div');
    num.className = 'frame-num';
    num.textContent = i + 1;
    wrap.appendChild(num);

    const del = document.createElement('div');
    del.className = 'frame-del';
    del.textContent = '×';
    del.onclick = (e) => { e.stopPropagation(); deleteFrame(i); };
    wrap.appendChild(del);

    frameStrip.insertBefore(wrap, addBtn);
  });
}

function updateThumb(idx) {
  const thumbs = frameStrip.querySelectorAll('.frame-thumb');
  if (thumbs[idx]) {
    const tc = thumbs[idx].querySelector('canvas');
    if (tc) tc.getContext('2d').drawImage(frames[idx], 0, 0, 80, 80);
  }
  updatePreview();
}

// ── ONION SKIN ──
function toggleOnion() {
  onionEnabled = !onionEnabled;
  onionToggle.classList.toggle('on', onionEnabled);
  composite();
}

// ── TOOLS ──
function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-' + t)?.classList.add('active');
  mainCanvas.style.cursor = t === 'eraser' ? 'cell' : t === 'fill' ? 'copy' : 'crosshair';
}

// ── DRAWING ──
function getPos(e) {
  const rect = mainCanvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top) * scaleY,
  };
}

function applyStyle(c, erase=false) {
  if (erase) {
    c.globalCompositeOperation = 'source-over';
    c.strokeStyle = '#ffffff';
    c.fillStyle = '#ffffff';
  } else {
    c.globalCompositeOperation = 'source-over';
    const rgb = hexToRgb(color);
    c.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${opacity})`;
    c.fillStyle   = `rgba(${rgb.r},${rgb.g},${rgb.b},${opacity})`;
  }
  c.lineWidth = brushSize;
  c.lineCap = 'round';
  c.lineJoin = 'round';
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function setupEvents() {
  mainCanvas.addEventListener('mousedown', startDraw);
  mainCanvas.addEventListener('mousemove', draw);
  mainCanvas.addEventListener('mouseup', endDraw);
  mainCanvas.addEventListener('mouseleave', endDraw);
  mainCanvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, {passive:false});
  mainCanvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e); }, {passive:false});
  mainCanvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(e); }, {passive:false});

  colorPicker.addEventListener('input', e => {
    color = e.target.value;
    colorDisplay.style.background = color;
    updateSelectedSwatch(color);
  });
  brushSlider.addEventListener('input', e => brushSize = +e.target.value);
  opacitySlider.addEventListener('input', e => {
    opacity = e.target.value / 100;
    opacityVal.textContent = e.target.value + '%';
  });
  fpsInput.addEventListener('input', () => {
    if (playing) { stopPlay(); startPlay(); }
  });
}

function startDraw(e) {
  const pos = getPos(e);
  if (tool === 'fill') { floodFill(Math.round(pos.x), Math.round(pos.y)); return; }
  pushHistory();
  isDrawing = true;

  if (['line','rect','circle'].includes(tool)) {
    shapeStart = pos;
    shapeSnap = dCtx.getImageData(0, 0, W, H);
    return;
  }

  dCtx.beginPath();
  applyStyle(dCtx, tool === 'eraser');
  dCtx.moveTo(pos.x, pos.y);
  if (tool === 'brush') { dCtx.arc(pos.x, pos.y, brushSize/2, 0, Math.PI*2); dCtx.fill(); }
  else dCtx.stroke();
  composite();
}

function draw(e) {
  if (!isDrawing) return;
  const pos = getPos(e);

  if (shapeStart) {
    dCtx.putImageData(shapeSnap, 0, 0);
    applyStyle(dCtx, false);
    dCtx.beginPath();
    if (tool === 'line') {
      dCtx.moveTo(shapeStart.x, shapeStart.y);
      dCtx.lineTo(pos.x, pos.y);
      dCtx.stroke();
    } else if (tool === 'rect') {
      dCtx.strokeRect(shapeStart.x, shapeStart.y, pos.x - shapeStart.x, pos.y - shapeStart.y);
    } else if (tool === 'circle') {
      const rx = Math.abs(pos.x - shapeStart.x) / 2;
      const ry = Math.abs(pos.y - shapeStart.y) / 2;
      const cx2 = (shapeStart.x + pos.x) / 2;
      const cy2 = (shapeStart.y + pos.y) / 2;
      dCtx.ellipse(cx2, cy2, rx, ry, 0, 0, Math.PI * 2);
      dCtx.stroke();
    }
    composite();
    return;
  }

  applyStyle(dCtx, tool === 'eraser');
  if (tool === 'brush') {
    dCtx.beginPath();
    dCtx.arc(pos.x, pos.y, brushSize/2, 0, Math.PI*2);
    dCtx.fill();
  } else {
    dCtx.lineTo(pos.x, pos.y);
    dCtx.stroke();
    dCtx.beginPath();
    dCtx.moveTo(pos.x, pos.y);
  }
  composite();
}

function endDraw(e) {
  if (!isDrawing) return;
  isDrawing = false;
  shapeStart = null;
  shapeSnap = null;
  saveCurrentToFrame();
  updateThumb(currentFrame);
}

// ── FLOOD FILL ──
function floodFill(sx, sy) {
  pushHistory();
  const imageData = dCtx.getImageData(0, 0, W, H);
  const data = imageData.data;
  const targetColor = getPixel(data, sx, sy);
  const rgb = hexToRgb(color);
  const fillColor = [rgb.r, rgb.g, rgb.b, Math.round(opacity * 255)];
  if (colorsMatch(targetColor, fillColor)) return;

  const stack = [[sx, sy]];
  while (stack.length) {
    const [x, y] = stack.pop();
    if (x < 0 || x >= W || y < 0 || y >= H) continue;
    const cur = getPixel(data, x, y);
    if (!colorsMatch(cur, targetColor)) continue;
    setPixel(data, x, y, fillColor);
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  dCtx.putImageData(imageData, 0, 0);
  composite();
  saveCurrentToFrame();
  updateThumb(currentFrame);
}

function getPixel(d, x, y) {
  const i = (y * W + x) * 4;
  return [d[i], d[i+1], d[i+2], d[i+3]];
}
function setPixel(d, x, y, c) {
  const i = (y * W + x) * 4;
  d[i]=c[0]; d[i+1]=c[1]; d[i+2]=c[2]; d[i+3]=c[3];
}
function colorsMatch(a, b, tol=20) {
  return Math.abs(a[0]-b[0]) < tol && Math.abs(a[1]-b[1]) < tol &&
         Math.abs(a[2]-b[2]) < tol && Math.abs(a[3]-b[3]) < tol;
}

// ── HISTORY ──
function pushHistory() {
  if (!history[currentFrame]) history[currentFrame] = [];
  history[currentFrame].push(dCtx.getImageData(0, 0, W, H));
  if (history[currentFrame].length > 40) history[currentFrame].shift();
  if (!redoStack[currentFrame]) redoStack[currentFrame] = [];
  redoStack[currentFrame] = [];
}

function undo() {
  if (!history[currentFrame]?.length) return;
  if (!redoStack[currentFrame]) redoStack[currentFrame] = [];
  redoStack[currentFrame].push(dCtx.getImageData(0, 0, W, H));
  dCtx.putImageData(history[currentFrame].pop(), 0, 0);
  saveCurrentToFrame();
  composite();
  updateThumb(currentFrame);
}

function redo() {
  if (!redoStack[currentFrame]?.length) return;
  history[currentFrame].push(dCtx.getImageData(0, 0, W, H));
  dCtx.putImageData(redoStack[currentFrame].pop(), 0, 0);
  saveCurrentToFrame();
  composite();
  updateThumb(currentFrame);
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'Z') { e.preventDefault(); redo(); }
});

// ── PLAYBACK ──
let playFrame = 0;

function togglePlay() {
  playing ? stopPlay() : startPlay();
}

function startPlay() {
  playing = true;
  document.getElementById('btn-play').textContent = '⏹';
  document.getElementById('btn-play').classList.add('active');
  playFrame = 0;
  const fps = Math.max(1, Math.min(60, parseInt(fpsInput.value) || 8));
  playInterval = setInterval(() => {
    previewCtx.clearRect(0, 0, W, H);
    previewCtx.drawImage(frames[playFrame], 0, 0);
    playFrame = (playFrame + 1) % frames.length;
  }, 1000 / fps);
}

function stopPlay() {
  playing = false;
  clearInterval(playInterval);
  document.getElementById('btn-play').textContent = '▶';
  document.getElementById('btn-play').classList.remove('active');
  updatePreview();
}

function updatePreview() {
  previewCtx.clearRect(0, 0, W, H);
  if (frames[currentFrame]) previewCtx.drawImage(frames[currentFrame], 0, 0);
}

// ── PALETTE ──
function buildPalette() {
  const grid = document.getElementById('palette-grid');
  PALETTE.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch';
    s.style.background = c;
    if (c === color) s.classList.add('selected');
    s.onclick = () => selectColor(c, s);
    grid.appendChild(s);
  });
}

function selectColor(c, el) {
  color = c;
  colorPicker.value = c;
  colorDisplay.style.background = c;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

function updateSelectedSwatch(c) {
  document.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('selected', s.style.background === c || rgbToHex(s.style.background) === c);
  });
}

function updateColorUI() {
  colorDisplay.style.background = color;
  colorPicker.value = color;
}

function rgbToHex(rgb) {
  const m = rgb.match(/\d+/g);
  if (!m || m.length < 3) return '#000000';
  return '#' + m.slice(0,3).map(n => (+n).toString(16).padStart(2,'0')).join('');
}

// ── EXPORT ──
let exportTimer = null;

function showExport() {
  saveCurrentToFrame();
  document.getElementById('modal-overlay').classList.add('visible');
  document.getElementById('export-progress').style.display = 'none';
  document.getElementById('export-bar').style.width = '0%';
  document.getElementById('export-btn').disabled = false;
  document.getElementById('export-btn').textContent = '⬇ Download All Frames';

  const ec = document.getElementById('export-canvas');
  ec.width = W; ec.height = H;
  ec.style.width = '220px'; ec.style.height = '220px';
  const ecx = ec.getContext('2d');
  let mf = 0;
  clearInterval(exportTimer);
  exportTimer = setInterval(() => {
    ecx.clearRect(0,0,W,H);
    ecx.drawImage(frames[mf], 0, 0);
    mf = (mf + 1) % frames.length;
  }, 1000 / (parseInt(fpsInput.value) || 8));
}

function hideExport() {
  clearInterval(exportTimer);
  document.getElementById('modal-overlay').classList.remove('visible');
}

async function downloadFrames() {
  saveCurrentToFrame();
  const btn = document.getElementById('export-btn');
  const progress = document.getElementById('export-progress');
  const bar = document.getElementById('export-bar');
  const note = document.getElementById('export-note');

  btn.disabled = true;
  progress.style.display = 'block';
  note.textContent = 'Building ZIP...';
  bar.style.width = '10%';

  const total = frames.length;
  const pad = Math.max(2, String(total).length);

  // ── Build a ZIP file manually (no external lib needed) ──
  // We use the ZIP local file format, then central directory, then end record.

  function crc32(data) {
    let crc = 0xFFFFFFFF;
    const table = crc32.table || (crc32.table = (() => {
      const t = new Uint32Array(256);
      for (let i = 0; i < 256; i++) {
        let c = i;
        for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        t[i] = c;
      }
      return t;
    })());
    for (let i = 0; i < data.length; i++) crc = table[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
    return (crc ^ 0xFFFFFFFF) >>> 0;
  }

  function u16(n) { const b = new Uint8Array(2); new DataView(b.buffer).setUint16(0, n, true); return b; }
  function u32(n) { const b = new Uint8Array(4); new DataView(b.buffer).setUint32(0, n, true); return b; }

  function strBytes(s) { return new TextEncoder().encode(s); }

  function concat(...arrays) {
    const total = arrays.reduce((s, a) => s + a.length, 0);
    const out = new Uint8Array(total);
    let off = 0;
    for (const a of arrays) { out.set(a, off); off += a.length; }
    return out;
  }

  const localHeaders = [];
  const centralHeaders = [];
  let offset = 0;

  for (let i = 0; i < total; i++) {
    const num = String(i + 1).padStart(pad, '0');
    const filename = `frame-${num}.png`;
    const nameBytes = strBytes(filename);

    // Get PNG bytes from canvas
    const dataURL = frames[i].toDataURL('image/png');
    const base64 = dataURL.split(',')[1];
    const binStr = atob(base64);
    const fileData = new Uint8Array(binStr.length);
    for (let j = 0; j < binStr.length; j++) fileData[j] = binStr.charCodeAt(j);

    const crc = crc32(fileData);
    const size = fileData.length;

    // DOS date/time = 0 (use epoch)
    const localHeader = concat(
      new Uint8Array([0x50,0x4B,0x03,0x04]), // local file signature
      u16(20),          // version needed
      u16(0),           // flags
      u16(0),           // compression (stored)
      u16(0), u16(0),   // mod time, mod date
      u32(crc),
      u32(size),        // compressed size
      u32(size),        // uncompressed size
      u16(nameBytes.length),
      u16(0),           // extra field length
      nameBytes,
      fileData
    );

    const centralHeader = concat(
      new Uint8Array([0x50,0x4B,0x01,0x02]), // central dir signature
      u16(20), u16(20), // version made by, version needed
      u16(0),           // flags
      u16(0),           // compression
      u16(0), u16(0),   // mod time, mod date
      u32(crc),
      u32(size),
      u32(size),
      u16(nameBytes.length),
      u16(0), u16(0),   // extra, comment length
      u16(0), u16(0),   // disk start, int attr
      u32(0),           // ext attr
      u32(offset),      // local header offset
      nameBytes
    );

    localHeaders.push(localHeader);
    centralHeaders.push(centralHeader);
    offset += localHeader.length;

    const pct = 10 + Math.round((i + 1) / total * 80);
    bar.style.width = pct + '%';
    note.textContent = `Packing frame ${i + 1} of ${total}...`;
    await new Promise(r => setTimeout(r, 0)); // yield to UI
  }

  // Central directory
  const centralDir = concat(...centralHeaders);
  const endRecord = concat(
    new Uint8Array([0x50,0x4B,0x05,0x06]), // end of central dir
    u16(0), u16(0),           // disk number, disk with start
    u16(total), u16(total),   // entries on disk, total entries
    u32(centralDir.length),
    u32(offset),              // central dir offset
    u16(0)                    // comment length
  );

  const zipBytes = concat(...localHeaders, centralDir, endRecord);
  const blob = new Blob([zipBytes], { type: 'application/zip' });
  const url = URL.createObjectURL(blob);

  bar.style.width = '100%';
  note.textContent = `✅ ZIP ready — ${total} frame${total > 1 ? 's' : ''}. Opening download...`;

  const a = document.createElement('a');
  a.href = url;
  a.download = 'flipdraw-frames.zip';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);

  btn.textContent = '✅ Done!';
  btn.disabled = false;
}

// ── FULL PAGE PREVIEW ──
let fullPreviewInterval = null;
let fullPreviewPlaying = false;
let fullPreviewFrame = 0;

function showFullPreview() {
  saveCurrentToFrame();
  const overlay = document.getElementById('preview-overlay');
  overlay.classList.add('visible');
  document.getElementById('preview-fps').value = fpsInput.value;

  const fc = document.getElementById('full-preview-canvas');
  fc.width = W; fc.height = H;

  // Scale canvas to fit nicely
  const maxW = window.innerWidth * 0.9;
  const maxH = (window.innerHeight - 60) * 0.85;
  const scale = Math.min(maxW / W, maxH / H);
  fc.style.width = Math.round(W * scale) + 'px';
  fc.style.height = Math.round(H * scale) + 'px';

  fullPreviewFrame = currentFrame;
  renderFullPreviewFrame();
}

function renderFullPreviewFrame() {
  const fc = document.getElementById('full-preview-canvas');
  const fcx = fc.getContext('2d');
  fcx.clearRect(0, 0, W, H);
  fcx.drawImage(frames[fullPreviewFrame], 0, 0);
  document.getElementById('preview-frame-indicator').textContent =
    `Frame ${fullPreviewFrame + 1} / ${frames.length}`;
}

function hideFullPreview() {
  stopFullPreview();
  document.getElementById('preview-overlay').classList.remove('visible');
}

function toggleFullPreview() {
  fullPreviewPlaying ? stopFullPreview() : startFullPreview();
}

function startFullPreview() {
  fullPreviewPlaying = true;
  fullPreviewFrame = 0;
  document.getElementById('prev-play-btn').textContent = '⏸';
  document.getElementById('prev-play-btn').classList.add('active');
  const fps = Math.max(1, Math.min(60, parseInt(document.getElementById('preview-fps').value) || 8));
  fullPreviewInterval = setInterval(() => {
    renderFullPreviewFrame();
    fullPreviewFrame = (fullPreviewFrame + 1) % frames.length;
  }, 1000 / fps);
}

function stopFullPreview() {
  fullPreviewPlaying = false;
  clearInterval(fullPreviewInterval);
  document.getElementById('prev-play-btn').textContent = '▶';
  document.getElementById('prev-play-btn').classList.remove('active');
}

function previewStepBack() {
  stopFullPreview();
  fullPreviewFrame = (fullPreviewFrame - 1 + frames.length) % frames.length;
  renderFullPreviewFrame();
}

function previewStepForward() {
  stopFullPreview();
  fullPreviewFrame = (fullPreviewFrame + 1) % frames.length;
  renderFullPreviewFrame();
}

function updatePreviewFps() {
  if (fullPreviewPlaying) { stopFullPreview(); startFullPreview(); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    hideFullPreview();
    hideExport();
  }
});

init();
</script>

<!-- FULL PREVIEW MODAL -->
<div id="preview-overlay">
  <div id="preview-topbar">
    <div id="preview-fps-wrap">
      FPS <input type="number" id="preview-fps" value="8" min="1" max="60" oninput="updatePreviewFps()">
    </div>
    <div id="preview-controls">
      <button class="prev-ctrl-btn" onclick="previewStepBack()">⏮</button>
      <button class="prev-ctrl-btn" id="prev-play-btn" onclick="toggleFullPreview()">▶</button>
      <button class="prev-ctrl-btn" onclick="previewStepForward()">⏭</button>
    </div>
    <div id="preview-frame-indicator">Frame 1 / 1</div>
    <button id="preview-close" onclick="hideFullPreview()">✕ Close</button>
  </div>
  <canvas id="full-preview-canvas"></canvas>
</div>
